[package]
name = "sbox"
version = "0.0.1"
edition = "2021"

[lib]
name = "sbox_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# macos-private-api：macOS 透明窗口（截图覆盖层）必需，否则 transparent 被系统忽略、显示为白底。
tauri = { version = "2", features = ["tray-icon", "image-png", "macos-private-api"] }
tauri-plugin-dialog = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
tauri-updater-kit = { git = "https://github.com/while-coder/tauri-updater-kit", branch = "main" }
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time", "rt", "sync", "macros"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "cookies"] }
url = "2"
sha1 = "0.10"
digest = "0.10"
base64 = "0.22"
rand = "0.8"
urlencoding = "2"
open = "5"
log = "0.4"
tauri-plugin-log = "2"
which = "7"
xcap = "0.9.6"
tauri-plugin-clipboard-manager = "2.3.2"

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.62", features = ["Win32_Foundation", "Win32_System_Registry", "Win32_UI_WindowsAndMessaging"] }

# dev 下也优化依赖（PNG 编码 / 截图捕获等），显著加快 tauri dev 的截图速度；
# 只优化依赖、不优化本 crate，增量编译仍快。
[profile.dev.package."*"]
opt-level = 3
